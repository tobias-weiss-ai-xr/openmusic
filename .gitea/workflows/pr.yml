name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typescript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install
      - run: npx tsc -p packages/effects/tsconfig.json
      - run: npx vitest run

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - uses: astral-sh/setup-uv@v4
      - run: cd packages/core && uv venv && uv pip install -e ".[dev]"
      - run: cd packages/core && .venv/bin/python -m pytest
