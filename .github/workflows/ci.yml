name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typescript:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
      - name: Install system dependencies
        run: |
          if command -v ffmpeg &>/dev/null; then
            echo "ffmpeg already installed"
          elif command -v apt-get &>/dev/null; then
            sudo apt-get update && sudo apt-get install -y ffmpeg
          elif command -v pacman &>/dev/null; then
            sudo pacman -S --noconfirm ffmpeg
          else
            echo "WARNING: Could not install ffmpeg, continuing anyway"
          fi
      - name: Install dependencies
        run: npm install
      - name: Build packages
        run: npx tsc -p packages/effects/tsconfig.json
      - name: Run TypeScript tests
        run: npx vitest run
  python:
    runs-on: self-hosted
    strategy:
      matrix:
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          if command -v ffmpeg &>/dev/null; then
            echo "ffmpeg already installed"
          elif command -v apt-get &>/dev/null; then
            sudo apt-get update && sudo apt-get install -y ffmpeg
          elif command -v pacman &>/dev/null; then
            sudo pacman -S --noconfirm ffmpeg
          else
            echo "WARNING: Could not install ffmpeg, continuing anyway"
          fi
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      - name: Install Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}
      - name: Install dependencies
        run: cd packages/core && uv venv --python ${{ matrix.python-version }} && uv pip install -e ".[dev]"
      - name: Run Python tests
        run: cd packages/core && .venv/bin/python -m pytest -v --tb=short
