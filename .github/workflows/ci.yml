name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typescript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - name: Install dependencies
        run: npm install
      - name: Build packages
        run: npx tsc -p packages/effects/tsconfig.json
      - name: Run TypeScript tests
        run: npx vitest run
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      - name: Install dependencies
        run: cd packages/core && uv venv && uv pip install -e ".[dev]"
      - name: Run Python tests
        run: cd packages/core && .venv/bin/python -m pytest
