[project]
name = "openmusic-core"
version = "0.1.0"
description = "OpenMusic core package for AI-powered dub techno generation"
requires-python = ">=3.10"
dependencies = ["click>=8.0", "PyYAML>=6.0", "numpy>=1.20", "soundfile>=0.12"]

[project.optional-dependencies]
dev = ["pytest>=7.0.0", "PyYAML>=6.0"]

[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project.scripts]
openmusic = "openmusic.cli.main:main"

[tool.coverage.run]
omit = ["*/verify_spectral_masking.py", "*/tests/*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
