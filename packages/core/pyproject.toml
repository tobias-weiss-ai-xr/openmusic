[project]
name = "openmusic-core"
version = "0.1.0"
description = "OpenMusic core package for AI-powered dub techno generation"
requires-python = ">=3.10"

[project.optional-dependencies]
dev = ["pytest>=7.0.0"]

[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[tool.pytest.ini_options]
testpaths = ["tests"]
